# Fast checks run first (parallel). Test matrix + coverage only after lint + workflow-scripts pass.
# ESLint/Prettier caches speed repeat runs. Matrix fail-fast cancels other Node versions on first failure.
# CodeQL stays in codeql.yml so scheduled scans do not run the full CI matrix.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Wave 1 — parallel, no npm (except lint)
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      # actions/cache@v4.2.3
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.js', 'package-lock.json') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      # actions/cache@v4.2.3
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: .prettier-cache
          key: prettier-${{ runner.os }}-${{ hashFiles('.prettierrc.json', 'package-lock.json') }}
          restore-keys: |
            prettier-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  workflow-scripts:
    name: ShellCheck & actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck scripts/*.sh

      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca

  # Wave 2 — only if fast gates pass (fail early: no matrix work when lint/scripts fail)
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: [lint, workflow-scripts]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Unit tests + coverage
        run: npx vitest run --coverage
