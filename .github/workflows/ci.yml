# Fast checks run first (parallel). Test matrix + coverage only after lint + workflow-scripts pass.
# ESLint/Prettier caches speed repeat runs. Matrix fail-fast cancels other Node versions on first failure.
# CodeQL stays in codeql.yml so scheduled scans do not run the full CI matrix.
# Node 20 (EOL) is not tested. Defaults use the latest Current line available on nodejs.org (v25+ here); add v26
# to the matrix and defaults when v26.0.0 is published to the dist index and `actions/setup-node` resolves it.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Wave 1 — parallel, no npm (except lint)
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "25"
          cache: npm

      # actions/cache@v4.2.3
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('eslint.config.js', 'package-lock.json') }}
          restore-keys: |
            eslint-${{ runner.os }}-

      # actions/cache@v4.2.3
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: .prettier-cache
          key: prettier-${{ runner.os }}-${{ hashFiles('.prettierrc.json', 'package-lock.json') }}
          restore-keys: |
            prettier-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install website dependencies (Prettier plugins for format:check)
        run: npm ci --prefix website

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

  # Same-repo PRs only: applies Prettier and pushes one commit when the lint job failed.
  # Loop prevention: (1) runs only when `lint` failed; after a successful fix the next run passes lint.
  # (2) Skips if the PR head is already an autofix commit (`[prettier-autofix]`).
  # (3) Skips if the triggering actor is github-actions[bot] (pushes from this job).
  # (4) No commit when `npm run format` produces no diff (e.g. ESLint failed but Prettier was already clean).
  #
  # Pushes with the default GITHUB_TOKEN do not trigger new workflow runs (GitHub suppresses recursive CI).
  # Optional repo secret PRETTIER_AUTOFIX_TOKEN: fine-grained PAT with Contents: Read and write on this
  # repo — use it for checkout/push so the post-autofix commit runs CI. Without it, re-run jobs manually
  # or push an empty commit on the PR branch.
  prettier-autofix:
    name: Prettier autofix (PR, same-repo)
    needs: lint
    if: |
      failure() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.PRETTIER_AUTOFIX_TOKEN != '' && secrets.PRETTIER_AUTOFIX_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "25"
          cache: npm

      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: .prettier-cache
          key: prettier-${{ runner.os }}-${{ hashFiles('.prettierrc.json', 'package-lock.json') }}
          restore-keys: |
            prettier-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install website dependencies (Prettier plugins)
        run: npm ci --prefix website

      - name: Guard — stop if HEAD is already a Prettier autofix commit
        id: guard
        run: |
          if git log -1 --format=%B | grep -qF '[prettier-autofix]'; then
            echo "stop=1" >> "$GITHUB_OUTPUT"
            echo "Skipping: HEAD already marked [prettier-autofix] (hard loop stop)."
          fi

      - name: Apply Prettier
        if: steps.guard.outputs.stop != '1'
        run: npm run format

      - name: Commit and push if there are changes
        if: steps.guard.outputs.stop != '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet && git diff --cached --quiet; then
            echo "No formatting changes; exiting without commit."
            exit 0
          fi
          git add -A
          git commit -m "style: apply Prettier [prettier-autofix]"
          git push origin "HEAD:${HEAD_REF}"

  workflow-scripts:
    name: ShellCheck & actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck scripts/*.sh

      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca

      # azure/setup-helm@v4.3.0
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112
        with:
          version: v3.17.0

      - name: Helm chart + Kustomize local overlay lint
        run: make lint-k8s-manifests

  supply-chain:
    name: Supply chain (OSV + Trivy + SBOM)
    needs: [lint, workflow-scripts]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Pin image digest moves with upstream; OSV DB is live at scan time.
      - name: OSV-Scanner (lockfiles + manifests)
        run: docker run --rm -v "$PWD:/repo" -w /repo ghcr.io/google/osv-scanner:latest scan --recursive --config osv-scanner.toml .

      # aquasecurity/trivy-action@v0.36.0 — vuln-only; filesystem mode skips vendored trees.
      - name: Trivy filesystem (HIGH / CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: "."
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          trivyignores: .trivyignore
          skip-dirs: node_modules,website/node_modules,dist,packages/mcp-grpc-transport/dist,packages/clawql-ouroboros/dist,.git

      # CycloneDX JSON for the repository (lockfiles + vendored sources Syft detects). Artifact for audits / #156.
      - name: CycloneDX SBOM (Syft)
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo anchore/syft:v1.19.0 \
            scan . -o "cyclonedx-json=sbom-cyclonedx-repo.cdx.json"

      # actions/upload-artifact@v4 (full commit pin flaky on some runners; tag resolves)
      - name: Upload repository SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-repository
          path: sbom-cyclonedx-repo.cdx.json
          if-no-files-found: error

  website-docker-smoke:
    name: Website Docker smoke
    needs: [lint, workflow-scripts]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Read package metadata
        id: pkg
        run: |
          echo "version=$(node -e 'console.log(require(\"./package.json\").version)')" >> "$GITHUB_OUTPUT"
          echo "description=$(node -e 'console.log(require(\"./package.json\").description)')" >> "$GITHUB_OUTPUT"

      - name: Build website image
        run: |
          docker build \
            -f website/Dockerfile \
            -t clawql-website:ci-smoke \
            --build-arg "CLAWQL_PACKAGE_VERSION=${{ steps.pkg.outputs.version }}" \
            --build-arg "CLAWQL_PACKAGE_DESCRIPTION=${{ steps.pkg.outputs.description }}" \
            ./website

      - name: Run website container
        run: |
          docker run -d --name clawql-website-smoke -p 4173:3000 clawql-website:ci-smoke
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Website health endpoint did not become ready in time"
          docker logs clawql-website-smoke || true
          exit 1

      - name: Cleanup website container
        if: always()
        run: docker rm -f clawql-website-smoke || true

  website-playwright-smoke:
    name: Website Playwright smoke
    needs: [lint, workflow-scripts]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci --prefix website

      - name: Install Playwright browser
        run: npx --prefix website playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm --prefix website run test:smoke

  # Wave 2 — only if fast gates pass (fail early: no matrix work when lint/scripts fail)
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: [lint, workflow-scripts, website-docker-smoke, website-playwright-smoke, supply-chain]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        node-version: [22, 24, 25]
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Unit tests + coverage
        run: npx vitest run --coverage

  ouroboros-postgres-optional:
    name: Ouroboros Postgres integration (optional)
    needs: [lint, workflow-scripts, website-docker-smoke, website-playwright-smoke, supply-chain]
    if: vars.CLAWQL_ENABLE_OUROBOROS_POSTGRES_CI == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clawql
          POSTGRES_PASSWORD: clawql
          POSTGRES_DB: clawql_ouroboros
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clawql -d clawql_ouroboros"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CLAWQL_OUROBOROS_DATABASE_URL: postgres://clawql:clawql@127.0.0.1:5432/clawql_ouroboros
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.3.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "25"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Ouroboros Postgres integration tests
        run: npx vitest run src/ouroboros/postgres-event-store.integration.test.ts
