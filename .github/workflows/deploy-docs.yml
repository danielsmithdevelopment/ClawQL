# Deploy the Next.js + OpenNext docs app (Worker `clawql-docs` → https://docs.clawql.com).
# Manual procedure and history: https://github.com/danielsmithdevelopment/ClawQL/issues/87
name: Deploy docs (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci --prefix website

      - name: OpenNext build + wrangler deploy
        working-directory: website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Optional: set when the API token is scoped to multiple accounts or wrangler does not default correctly.
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: https://docs.clawql.com
        run: npm run deploy
