# Build and push the Distroless MCP image to GitHub Container Registry (GHCR).
# Daily schedule keeps `latest` / `nightly` fresh; manual runs via workflow_dispatch.
name: Docker publish

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  # GHCR requires lowercase; package name matches npm `clawql-mcp`.
  IMAGE_NAME: ghcr.io/danielsmithdevelopment/clawql-mcp
  WEBSITE_IMAGE_NAME: ghcr.io/danielsmithdevelopment/clawql-website

jobs:
  build-push-mcp:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # docker/setup-buildx-action@v3.11.1
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      # docker/login-action@v3.4.0
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action@v5.7.0
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=nightly
            type=sha,prefix=sha-,format=short
            type=schedule,pattern=nightly-{{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # docker/build-push-action@v6.18.0
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Apple Silicon Docker Desktop (linux/arm64) + typical Linux nodes (amd64)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-website:
    name: Build and push website
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # docker/setup-buildx-action@v3.11.1
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      # docker/login-action@v3.4.0
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package metadata
        id: pkg
        run: |
          echo "version=$(node -e 'console.log(require(\"./package.json\").version)')" >> "$GITHUB_OUTPUT"
          echo "description=$(node -e 'console.log(require(\"./package.json\").description)')" >> "$GITHUB_OUTPUT"

      # docker/metadata-action@v5.7.0
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
        with:
          images: ${{ env.WEBSITE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=nightly
            type=sha,prefix=sha-,format=short
            type=schedule,pattern=nightly-{{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # docker/build-push-action@v6.18.0
      - name: Build and push website
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: ./website
          file: website/Dockerfile
          push: true
          # Apple Silicon Docker Desktop (linux/arm64) + typical Linux nodes (amd64)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLAWQL_PACKAGE_VERSION=${{ steps.pkg.outputs.version }}
            CLAWQL_PACKAGE_DESCRIPTION=${{ steps.pkg.outputs.description }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
