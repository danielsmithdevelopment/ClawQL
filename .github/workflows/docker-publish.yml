# Build and push the Distroless MCP image to GitHub Container Registry (GHCR).
# Daily schedule keeps `latest` / `nightly` fresh; manual runs via workflow_dispatch.
name: Docker publish

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  # GHCR requires lowercase; package name matches npm `clawql-mcp`.
  IMAGE_NAME: ghcr.io/danielsmithdevelopment/clawql-mcp

jobs:
  build-push:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # docker/setup-buildx-action@v3.11.1
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      # docker/login-action@v3.4.0
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action@v5.7.0
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=nightly
            type=sha,prefix=sha-,format=short
            type=schedule,pattern=nightly-{{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # docker/build-push-action@v6.18.0
      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
