  metricMeanInRange: MetricRange_Input

  """
  Duration over which window quality is evaluated. Must be an integer fraction of a day and at least 60s.
  """
  windowPeriod: String
  metricSumInRange: MetricRange_Input

  """
  A monitoring filter (https://cloud.google.com/monitoring/api/v3/filters) specifying a TimeSeries with ValueType = BOOL. The window is good if any true values appear in the window.
  """
  goodBadMetricFilter: String
}

"""
A PerformanceThreshold is used when each window is good when that window has a sufficiently high performance.
"""
input PerformanceThreshold_Input {
  performance: RequestBasedSli_Input

  """If window performance >= threshold, the window is counted as good."""
  threshold: Float
  basicSliPerformance: BasicSli_Input
}

"""
Service Level Indicators for which atomic units of service are counted directly.
"""
input RequestBasedSli_Input {
  goodTotalRatio: TimeSeriesRatio_Input
  distributionCut: DistributionCut_Input
}

"""
A TimeSeriesRatio specifies two TimeSeries to use for computing the good_service / total_service ratio. The specified TimeSeries must have ValueType = DOUBLE or ValueType = INT64 and must have MetricKind = DELTA or MetricKind = CUMULATIVE. The TimeSeriesRatio must specify exactly two of good, bad, and total, and the relationship good_service + bad_service = total_service will be assumed.
"""
input TimeSeriesRatio_Input {
  """
  A monitoring filter (https://cloud.google.com/monitoring/api/v3/filters) specifying a TimeSeries quantifying total demanded service. Must have ValueType = DOUBLE or ValueType = INT64 and must have MetricKind = DELTA or MetricKind = CUMULATIVE.
  """
  totalServiceFilter: String

  """
  A monitoring filter (https://cloud.google.com/monitoring/api/v3/filters) specifying a TimeSeries quantifying bad service, either demanded service that was not provided or demanded service that was of inadequate quality. Must have ValueType = DOUBLE or ValueType = INT64 and must have MetricKind = DELTA or MetricKind = CUMULATIVE.
  """
  badServiceFilter: String

  """
  A monitoring filter (https://cloud.google.com/monitoring/api/v3/filters) specifying a TimeSeries quantifying good service provided. Must have ValueType = DOUBLE or ValueType = INT64 and must have MetricKind = DELTA or MetricKind = CUMULATIVE.
  """
  goodServiceFilter: String
}

"""
A DistributionCut defines a TimeSeries and thresholds used for measuring good service and total service. The TimeSeries must have ValueType = DISTRIBUTION and MetricKind = DELTA or MetricKind = CUMULATIVE. The computed good_service will be the estimated count of values in the Distribution that fall within the specified min and max.
"""
input DistributionCut_Input {
  """
  A monitoring filter (https://cloud.google.com/monitoring/api/v3/filters) specifying a TimeSeries aggregating values. Must have ValueType = DISTRIBUTION and MetricKind = DELTA or MetricKind = CUMULATIVE.
  """
  distributionFilter: String
