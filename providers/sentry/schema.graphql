"""
Allows parameters to be defined in snake case, but passed as camel case.

Errors are output in camel case.
"""
input Create_an_Alert_for_an_Organization_request_Input {
  """The name of the alert"""
  name: mutationInput_Create_an_Alert_for_an_Organization_input_name!

  """The ID of the existing alert"""
  id: String

  """Whether the alert is enabled or disabled"""
  enabled: Boolean = true

  """
  Typically the frequency at which the alert will fire, in minutes.
  
          - `0`: 0 minutes
          - `5`: 5 minutes
          - `10`: 10 minutes
          - `30`: 30 minutes
          - `60`: 1 hour
          - `180`: 3 hours
          - `720`: 12 hours
          - `1440`: 24 hours
  
          ```json
              {
                  "frequency":3600
              }
          ```
  """
  config: JSON

  """The name of the environment for the alert to evaluate in"""
  environment: String
  triggers: mutationInput_Create_an_Alert_for_an_Organization_input_triggers_Input

  """
  The filters to run before the action will fire and the action(s) to fire.
  
          `logicType` can be one of `any-short`, `all`, or `none`.
  
          Below is a basic example. See below for all other options.
  
          ```json
              "actionFilters": [
                  {
                      "logicType": "any",
                      "conditions": [
                          {
                              "type": "level",
                              "comparison": {
                                  "level": 50,
                                  "match": "eq"
                              },
                              "conditionResult": true
                          }
                      ],
                      "actions": [
                          {
                              "id": "123",
                              "type": "email",
                              "integrationId": null,
                              "data": {},
                              "config": {
                                  "targetType": "user",
                                  "targetDisplay": null,
                                  "targetIdentifier": "56789"
                              },
                              "status": "active"
                          }
                      ]
                  }
              ]
          ```
  
          ## Conditions
  
          **Issue Age**
          - `time`: One of `minute`, `hour`, `day`, or `week`.
          - `value`: A positive integer.
          - `comparisonType`: One of `older` or `newer`.
          ```json
              {
                  "type": "age_comparison",
                  "comparison": {
                      "time": "minute",
                      "value": 10,
                      "comparisonType": "older"
                  },
                  "conditionResult": true
              }
  
          ```
  
          **Issue Assignment**
          - `targetType`: Who the issue is assigned to
              - `Unassigned`: Unassigned
              - `Member`: Assigned to a user
              - `Team`: Assigned to a team
          - `targetIdentifier`: The ID of the user or team from the `targetType`. Enter "" if `targetType` is `Unassigned`.
          ```json
              {
                  "type": "assigned_to",
                  "comparison": {
                      "targetType": "Member",
                      "targetIdentifier": 123456
                  },
                  "conditionResult": true
              }
          ```
  
          **Issue Category**
          - `value`: The issue category to filter to.
              - `1`: Error issues
              - `6`: Feedback issues
              - `10`: Outage issues
              - `11`: Metric issues
              - `12`: DB Query issues
              - `13`: HTTP Client issues
              - `14`: Front end issues
              - `15`: Mobile issues
          ```json
              {
                  "type": "issue_category",
                  "comparison": {
                      "value": 1
                  },
                  "conditionResult": true
              }
          ```
  
          **Issue Frequency**
          - `value`: A positive integer representing how many times the issue has to happen before the alert will fire.
          ```json
              {
                  "type": "issue_occurrences",
                  "comparison": {
                      "value": 10
                  },
                  "conditionResult": true
              }
          ```
  
          **De-escalation**
          ```json
              {
                  "type": "issue_priority_deescalating",
