# istio/gateway chart — classic sidecar injection (namespace istio-injection=enabled).
# Release name must stay clawql-mcp-ingress.
autoscaling:
  enabled: false
service:
  type: LoadBalancer
  ports:
    - name: status-port
      port: 15021
      protocol: TCP
      targetPort: 15021
    - name: http2
      port: 80
      protocol: TCP
      targetPort: 80
    - name: https
      port: 443
      protocol: TCP
      targetPort: 443
    - name: tcp-grpc-mcp
      port: 50051
      protocol: TCP
      targetPort: 50051
