# Local Docker Desktop: OTLP ingress for app traces → Jaeger (Istio samples/addons/jaeger.yaml).
# Applied by scripts/kubernetes/install-istio-docker-desktop.sh after jaeger.yaml.
# ClawQL MCP: CLAWQL_ENABLE_OTEL_TRACING=1 and
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://clawql-otel-collector.istio-system.svc:4318/v1/traces
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawql-otel-collector
  namespace: istio-system
  labels:
    app.kubernetes.io/name: clawql-otel-collector
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch: {}
    exporters:
      otlp:
        endpoint: jaeger-collector.istio-system.svc.cluster.local:4317
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-otel-collector
  namespace: istio-system
  labels:
    app.kubernetes.io/name: clawql-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clawql-otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clawql-otel-collector
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector:0.104.0
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: otlp-http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: otlp-http
            initialDelaySeconds: 5
            periodSeconds: 20
      volumes:
        - name: config
          configMap:
            name: clawql-otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: clawql-otel-collector
  namespace: istio-system
  labels:
    app.kubernetes.io/name: clawql-otel-collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clawql-otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
