apiVersion: v1
kind: Namespace
metadata:
  name: clawql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-graphql
  namespace: clawql
  labels:
    app: clawql-graphql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawql-graphql
  template:
    metadata:
      labels:
        app: clawql-graphql
    spec:
      containers:
        - name: clawql-graphql
          image: clawql-mcp:latest
          imagePullPolicy: IfNotPresent
          args: ["dist/graphql-proxy.js"]
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: CLAWQL_PROVIDER
              value: google-top50
            - name: GRAPHQL_PORT
              value: "4000"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: clawql-graphql
  namespace: clawql
  labels:
    app: clawql-graphql
spec:
  type: ClusterIP
  selector:
    app: clawql-graphql
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-mcp-http
  namespace: clawql
  labels:
    app: clawql-mcp-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawql-mcp-http
  template:
    metadata:
      labels:
        app: clawql-mcp-http
    spec:
      containers:
        - name: clawql-mcp-http
          image: clawql-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CLAWQL_PROVIDER
              value: google-top50
            - name: GRAPHQL_URL
              value: http://clawql-graphql:4000/graphql
            - name: PORT
              value: "8080"
            - name: MCP_PATH
              value: /mcp
            - name: CLAWQL_BUNDLED_OFFLINE
              value: "1"
            - name: CLAWQL_OBSIDIAN_VAULT_PATH
              value: /vault
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 36
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: obsidian-vault
              mountPath: /vault
      volumes:
        - name: obsidian-vault
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: clawql-mcp-http
  namespace: clawql
  labels:
    app: clawql-mcp-http
spec:
  # Switch to Ingress if your cluster standardizes on that.
  type: LoadBalancer
  selector:
    app: clawql-mcp-http
  ports:
    - name: http
      port: 80
      targetPort: 8080
