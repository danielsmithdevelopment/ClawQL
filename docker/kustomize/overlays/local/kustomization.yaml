apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Optional Docker Desktop install via Kustomize (default installer is Helm — see
# CLAWQL_LOCAL_K8S_INSTALLER). scripts/kubernetes/local-k8s-docker-desktop.sh generates
# patch-mcp-vault-hostpath.json before kubectl apply -k.
resources:
  - ../../base

patches:
  - path: patch-mcp-service.yaml
  - path: patch-mcp-deployment.yaml
  - path: patch-local-provider-env.yaml
  - path: patch-mcp-vault-hostpath.json
    target:
      group: apps
      version: v1
      kind: Deployment
      name: clawql-mcp-http

images:
  - name: clawql-mcp
    newName: ghcr.io/danielsmithdevelopment/clawql-mcp
    newTag: latest
