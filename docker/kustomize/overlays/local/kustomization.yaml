apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Docker Desktop Kubernetes: use local image `clawql-mcp:latest` and expose MCP on localhost:8080.
# Build first: docker build -f docker/Dockerfile -t clawql-mcp:latest .
resources:
  - ../../base

patches:
  - path: patch-mcp-service.yaml
  - path: patch-mcp-deployment.yaml
  - path: patch-local-provider-env.yaml
  # Generated by scripts/local-k8s-docker-desktop.sh — JSON replace for volumes[0] (see script comment)
  - path: patch-mcp-vault-hostpath.json
    target:
      group: apps
      version: v1
      kind: Deployment
      name: clawql-mcp-http

images:
  - name: clawql-mcp
    newName: clawql-mcp
    newTag: latest
