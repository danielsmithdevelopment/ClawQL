apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Docker Desktop Kubernetes: pull the prebuilt image from GHCR (default tag: latest).
# Optional local build: CLAWQL_LOCAL_K8S_BUILD_IMAGE=1 with scripts/local-k8s-docker-desktop.sh
resources:
  - ../../base

patches:
  - path: patch-mcp-service.yaml
  - path: patch-mcp-deployment.yaml
  - path: patch-local-provider-env.yaml
  # Generated by scripts/local-k8s-docker-desktop.sh — JSON replace for volumes[0] (see script comment)
  - path: patch-mcp-vault-hostpath.json
    target:
      group: apps
      version: v1
      kind: Deployment
      name: clawql-mcp-http

images:
  - name: clawql-mcp
    newName: ghcr.io/danielsmithdevelopment/clawql-mcp
    newTag: latest
