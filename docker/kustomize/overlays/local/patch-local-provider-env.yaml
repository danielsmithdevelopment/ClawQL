# Local Docker Desktop: same default merge as bare npm (Google top50 + Cloudflare + GitHub + Slack + Paperless + Stirling + Tika + Gotenberg).
# Pin github, cloudflare, google (merged Google Cloud APIs), or all-providers if you prefer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-mcp-http
spec:
  template:
    spec:
      containers:
        - name: clawql-mcp-http
          env:
            - name: CLAWQL_PROVIDER
              value: all-providers
