# Same resource profile as dev overlay (laptop-friendly).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-graphql
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: clawql-graphql
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
