apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-mcp-http
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: clawql-mcp-http
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=3072"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
