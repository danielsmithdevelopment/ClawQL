# LoadBalancer: expose HTTP (80→8080) and gRPC (50051) on the Service so gRPC clients use the LB without port-forward.
# Requires ENABLE_GRPC=1 on the pod for anything to listen on targetPort grpc.
apiVersion: v1
kind: Service
metadata:
  name: clawql-mcp-http
spec:
  type: LoadBalancer
  ports:
    - $patch: replace
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: grpc
