apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-graphql
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: clawql-graphql
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
