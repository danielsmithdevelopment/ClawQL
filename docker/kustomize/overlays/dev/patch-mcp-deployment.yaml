apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-mcp-http
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: clawql-mcp-http
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
