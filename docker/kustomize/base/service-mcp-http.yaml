# HTTP (Streamable MCP) and gRPC (protobuf MCP) are both published on the Service.
# The gRPC listener exists only when ENABLE_GRPC=1 on the pod; the port remains defined for stable LB / DNS.
apiVersion: v1
kind: Service
metadata:
  name: clawql-mcp-http
  labels:
    app: clawql-mcp-http
  annotations:
    # Istio sample Prometheus (istio-system) — job kubernetes-service-endpoints.
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  type: LoadBalancer
  selector:
    app: clawql-mcp-http
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: grpc
