apiVersion: v1
kind: Service
metadata:
  name: clawql-mcp-http
  labels:
    app: clawql-mcp-http
spec:
  type: LoadBalancer
  selector:
    app: clawql-mcp-http
  ports:
    - name: http
      port: 80
      targetPort: 8080
    # Optional when ENABLE_GRPC=1 on the pod.
    - name: grpc
      port: 50051
      targetPort: grpc
