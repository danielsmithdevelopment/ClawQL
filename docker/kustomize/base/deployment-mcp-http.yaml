apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawql-mcp-http
  labels:
    app: clawql-mcp-http
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clawql-mcp-http
  template:
    metadata:
      labels:
        app: clawql-mcp-http
    spec:
      containers:
        - name: clawql-mcp-http
          image: clawql-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CLAWQL_PROVIDER
              value: google-top50
            - name: CLAWQL_OBSIDIAN_VAULT_PATH
              value: /vault
            - name: PORT
              value: "8080"
            - name: MCP_PATH
              value: /mcp
            - name: CLAWQL_BUNDLED_OFFLINE
              value: "1"
            # Multi-spec merge can exceed Node's default ~512Mi heap; size within cgroup limit (leave headroom for native alloc).
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            failureThreshold: 36
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: obsidian-vault
              mountPath: /vault
      volumes:
        - name: obsidian-vault
          emptyDir: {}
