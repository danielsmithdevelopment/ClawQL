# Used by scripts/local-k8s-docker-desktop.sh — Docker Desktop + LoadBalancer on :8080.
# vault.hostPath.path is set by the script (--set-string). For manual helm install, pass
#   --set-string vault.hostPath.path=/absolute/path/to/vault

fullnameOverride: clawql-mcp-http

provider: all-providers

image:
  repository: ghcr.io/danielsmithdevelopment/clawql-mcp
  tag: latest
  pullPolicy: Always

service:
  type: LoadBalancer
  http:
    port: 8080
    targetPort: 8080
  grpc:
    port: 50051
    targetPort: 50051

nodeOptions: "--max-old-space-size=768"

# Enable all MCP/local feature flags for Docker Desktop local-k8s-up.
enableGrpc: true
enableGrpcReflection: true
enableNotify: true
enableOnyx: true
enableOuroboros: true

# Local defaults; override via env/secret for real integrations.
# Full Onyx is heavy: give Docker Desktop Kubernetes enough RAM (e.g. 12–16 GiB in
# Settings → Resources) or lower onyx.*.resources.requests below further.
onyx:
  enabled: true
  fullVectorStack: true
  authType: basic
  userAuthSecret: "clawql-local-onyx-auth-secret"
  postgres:
    auth:
      password: "change-me"
    persistence:
      enabled: true
  opensearch:
    javaOpts: "-Xms256m -Xmx256m"
    persistence:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 384Mi
      limits:
        cpu: "2"
        memory: 1536Mi
  vespa:
    persistence:
      enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 3Gi
  minio:
    persistence:
      enabled: true
  modelServer:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 4Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1536Mi

ouroborosPostgres:
  enabled: true
  auth:
    password: "change-me"

nats:
  enabled: true

flink:
  enabled: true
  jobManagerMemoryProcessSize: "1024m"
  taskManagerMemoryProcessSize: "2048m"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

vault:
  hostPath:
    enabled: true
    # Set by script (default $HOME/.ClawQL), e.g.:
    # path: /Users/you/.ClawQL
    path: ""
    type: DirectoryOrCreate

ui:
  enabled: true
  image:
    repository: clawql-website
    tag: latest
    pullPolicy: IfNotPresent
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: clawql.localhost
        paths:
          - path: /
            pathType: Prefix

providerIngress:
  enabled: true
  className: nginx
  paperless:
    host: paperless.localhost
  stirling:
    host: stirling.localhost
  tika:
    host: tika.localhost
  gotenberg:
    host: gotenberg.localhost
  flink:
    host: flink.localhost
  natsMonitor:
    host: nats.localhost
  onyx:
    host: onyx.localhost

envFromSecret: clawql-github-auth

documentPipeline:
  stirling:
    security:
      enableLogin: true
      disableAdditionalFeatures: false
  paperless:
    auth:
      adminUser: admin
      adminPassword: admin
      adminMail: admin@localhost
