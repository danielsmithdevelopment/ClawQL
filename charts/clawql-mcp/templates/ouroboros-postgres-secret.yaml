{{- if and .Values.ouroborosPostgres.enabled (not .Values.ouroborosPostgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawql-mcp.ouroborosPostgresSecretName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ouroboros-postgres
type: Opaque
data:
  password: {{ required "ouroborosPostgres.auth.password is required when ouroborosPostgres.enabled and auth.existingSecret is empty" .Values.ouroborosPostgres.auth.password | b64enc | quote }}
{{- end }}
