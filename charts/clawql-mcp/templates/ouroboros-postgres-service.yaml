{{- if .Values.ouroborosPostgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.ouroborosPostgresName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: ouroboros-postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "clawql-mcp.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ouroboros-postgres
  ports:
    - name: postgres
      port: {{ .Values.ouroborosPostgres.service.port | int }}
      targetPort: postgres
      protocol: TCP
{{- end }}
