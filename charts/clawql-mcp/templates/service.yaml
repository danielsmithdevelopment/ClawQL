apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.fullname" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app: {{ include "clawql-mcp.fullname" . }}
  {{- $prom := .Values.metrics.prometheusScrapeAnnotations }}
  {{- if or $prom.enabled .Values.service.annotations }}
  annotations:
    {{- if $prom.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/path: {{ $prom.path | default "/metrics" | quote }}
    prometheus.io/port: {{ ($prom.port | default .Values.service.http.targetPort) | toString | quote }}
    {{- end }}
    {{- with .Values.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "clawql-mcp.selectorLabels" . | nindent 4 }}
    app: {{ include "clawql-mcp.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpc.port }}
      targetPort: grpc
      protocol: TCP
