{{- if .Values.ui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawql-mcp.uiName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app: {{ include "clawql-mcp.uiName" . }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app: {{ include "clawql-mcp.uiName" . }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app: {{ include "clawql-mcp.uiName" . }}
        app.kubernetes.io/component: ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.targetPort | int }}
              protocol: TCP
          startupProbe:
            {{- toYaml .Values.ui.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ui.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.ui.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
{{- end }}
