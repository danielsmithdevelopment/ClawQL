{{- if .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "clawql-mcp.fullname" . }}
  namespace: {{ .Values.metrics.serviceMonitor.namespace | default .Release.Namespace }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app: {{ include "clawql-mcp.fullname" . }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app: {{ include "clawql-mcp.fullname" . }}
  endpoints:
    - port: http
      path: {{ .Values.metrics.prometheusScrapeAnnotations.path | default "/metrics" }}
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
      scheme: http
{{- end }}
