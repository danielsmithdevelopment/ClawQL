{{- if .Values.onyx.enabled }}
{{- if and (not .Values.onyx.postgres.auth.existingSecret) (not .Values.onyx.postgres.auth.password) }}
{{- fail "onyx.postgres.auth.password is required when onyx.enabled=true and onyx.postgres.auth.existingSecret is empty" }}
{{- end }}
{{- if not .Values.onyx.userAuthSecret }}
{{- fail "onyx.userAuthSecret is required when onyx.enabled=true" }}
{{- end }}
{{- if and .Values.onyx.fullVectorStack (not .Values.onyx.opensearch.auth.existingSecret) (not .Values.onyx.opensearch.auth.adminPassword) }}
{{- fail "onyx.opensearch.auth.adminPassword is required when onyx.enabled=true, onyx.fullVectorStack=true, and onyx.opensearch.auth.existingSecret is empty" }}
{{- end }}
{{- if and .Values.onyx.fullVectorStack (not .Values.onyx.minio.auth.existingSecret) }}
{{- if or (not .Values.onyx.minio.auth.rootUser) (not .Values.onyx.minio.auth.rootPassword) }}
{{- fail "onyx.minio.auth.rootUser and rootPassword are required when onyx.fullVectorStack=true and onyx.minio.auth.existingSecret is empty" }}
{{- end }}
{{- end }}
{{- if and (not .Values.onyx.postgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawql-mcp.onyxPostgresSecretName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-postgres
type: Opaque
data:
  password: {{ .Values.onyx.postgres.auth.password | b64enc | quote }}
---
{{- end }}
{{- if and .Values.onyx.fullVectorStack (not .Values.onyx.opensearch.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawql-mcp.onyxOpenSearchSecretName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-opensearch
type: Opaque
stringData:
  {{- $osk := .Values.onyx.opensearch.auth.existingSecretPasswordKey }}
  {{ $osk }}: {{ .Values.onyx.opensearch.auth.adminPassword | quote }}
---
{{- end }}
{{- if and .Values.onyx.fullVectorStack (not .Values.onyx.minio.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawql-mcp.onyxMinioSecretName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-minio
type: Opaque
stringData:
  {{- $muk := .Values.onyx.minio.auth.existingSecretUserKey }}
  {{- $mpk := .Values.onyx.minio.auth.existingSecretPasswordKey }}
  {{ $muk }}: {{ .Values.onyx.minio.auth.rootUser | quote }}
  {{ $mpk }}: {{ .Values.onyx.minio.auth.rootPassword | quote }}
---
{{- end }}
{{- if and .Values.onyx.postgres.persistence.enabled (not .Values.onyx.postgres.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "clawql-mcp.onyxPostgresName" . }}-data
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-postgres
spec:
  accessModes:
    {{- toYaml .Values.onyx.postgres.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.onyx.postgres.persistence.size }}
  {{- if .Values.onyx.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.onyx.postgres.persistence.storageClass | quote }}
  {{- end }}
---
{{- end }}
{{- if and .Values.onyx.fullVectorStack .Values.onyx.opensearch.persistence.enabled (not .Values.onyx.opensearch.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "clawql-mcp.onyxOpenSearchName" . }}-data
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-opensearch
spec:
  accessModes:
    {{- toYaml .Values.onyx.opensearch.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.onyx.opensearch.persistence.size }}
  {{- if .Values.onyx.opensearch.persistence.storageClass }}
  storageClassName: {{ .Values.onyx.opensearch.persistence.storageClass | quote }}
  {{- end }}
---
{{- end }}
{{- if and .Values.onyx.fullVectorStack .Values.onyx.minio.persistence.enabled (not .Values.onyx.minio.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "clawql-mcp.onyxMinioName" . }}-data
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-minio
spec:
  accessModes:
    {{- toYaml .Values.onyx.minio.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.onyx.minio.persistence.size }}
  {{- if .Values.onyx.minio.persistence.storageClass }}
  storageClassName: {{ .Values.onyx.minio.persistence.storageClass | quote }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.onyxPostgresName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-postgres
spec:
  type: ClusterIP
  selector:
    {{- include "clawql-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-postgres
  ports:
    - name: postgres
      port: {{ .Values.onyx.postgres.service.port | int }}
      targetPort: postgres
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawql-mcp.onyxPostgresName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-postgres
spec:
  replicas: 1
  {{- if .Values.onyx.postgres.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: onyx-postgres
  template:
    metadata:
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: onyx-postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.onyx.postgres.image.repository }}:{{ .Values.onyx.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.onyx.postgres.image.pullPolicy }}
          {{- if .Values.onyx.fullVectorStack }}
          # Use args only — keep image ENTRYPOINT (docker-entrypoint.sh) so Postgres does not run as root.
          args:
            - postgres
            - -c
            - max_connections=250
          {{- end }}
          ports:
            - name: postgres
              containerPort: {{ .Values.onyx.postgres.service.port | int }}
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.onyx.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.onyx.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxPostgresSecretName" . }}
                  key: password
          {{- if .Values.onyx.postgres.persistence.enabled }}
          volumeMounts:
            - name: onyx-postgres-data
              mountPath: /var/lib/postgresql/data
          {{- end }}
          resources:
            {{- toYaml .Values.onyx.postgres.resources | nindent 12 }}
      {{- if .Values.onyx.postgres.persistence.enabled }}
      volumes:
        - name: onyx-postgres-data
          {{- if .Values.onyx.postgres.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.onyx.postgres.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "clawql-mcp.onyxPostgresName" . }}-data
          {{- end }}
      {{- end }}
---
{{- if .Values.onyx.fullVectorStack }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.onyxRedisName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-redis
spec:
  type: ClusterIP
  selector:
    {{- include "clawql-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-redis
  ports:
    - name: redis
      port: {{ .Values.onyx.redis.service.port | int }}
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawql-mcp.onyxRedisName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: onyx-redis
  template:
    metadata:
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: onyx-redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.onyx.redis.image.repository }}:{{ .Values.onyx.redis.image.tag }}"
          imagePullPolicy: {{ .Values.onyx.redis.image.pullPolicy }}
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - name: redis
              containerPort: {{ .Values.onyx.redis.service.port | int }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.onyx.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.onyxOpenSearchName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-opensearch
spec:
  type: ClusterIP
  selector:
    {{- include "clawql-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-opensearch
  ports:
    - name: http
      port: {{ .Values.onyx.opensearch.service.port | int }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawql-mcp.onyxOpenSearchName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-opensearch
spec:
  replicas: 1
  {{- if .Values.onyx.opensearch.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: onyx-opensearch
  template:
    metadata:
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: onyx-opensearch
    spec:
      containers:
        - name: opensearch
          image: "{{ .Values.onyx.opensearch.image.repository }}:{{ .Values.onyx.opensearch.image.tag }}"
          imagePullPolicy: {{ .Values.onyx.opensearch.image.pullPolicy }}
          env:
            - name: discovery.type
              value: single-node
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxOpenSearchSecretName" . }}
                  key: {{ .Values.onyx.opensearch.auth.existingSecretPasswordKey }}
            - name: OPENSEARCH_JAVA_OPTS
              value: {{ .Values.onyx.opensearch.javaOpts | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.onyx.opensearch.service.port | int }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 60
          {{- if .Values.onyx.opensearch.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          {{- end }}
          resources:
            {{- toYaml .Values.onyx.opensearch.resources | nindent 12 }}
      {{- if .Values.onyx.opensearch.persistence.enabled }}
      volumes:
        - name: data
          {{- if .Values.onyx.opensearch.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.onyx.opensearch.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "clawql-mcp.onyxOpenSearchName" . }}-data
          {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.onyxVespaName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-vespa
spec:
  type: ClusterIP
  clusterIP: None
  sessionAffinity: None
  selector:
    {{- include "clawql-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-vespa
  ports:
    - name: config
      port: 19071
      targetPort: 19071
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "clawql-mcp.onyxVespaName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-vespa
spec:
  serviceName: {{ include "clawql-mcp.onyxVespaName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: onyx-vespa
  template:
    metadata:
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: onyx-vespa
    spec:
      containers:
        - name: vespa
          image: "{{ .Values.onyx.vespa.image.repository }}:{{ .Values.onyx.vespa.image.tag }}"
          imagePullPolicy: {{ .Values.onyx.vespa.image.pullPolicy }}
          env:
            - name: VESPA_SKIP_UPGRADE_CHECK
              value: {{ .Values.onyx.vespa.skipUpgradeCheck | quote }}
          ports:
            - name: config
              containerPort: 19071
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /state/v1/health
              port: config
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          startupProbe:
            httpGet:
              path: /state/v1/health
              port: config
            periodSeconds: 10
            failureThreshold: 90
          volumeMounts:
            - name: vespa-data
              mountPath: /opt/vespa/var
          resources:
            {{- toYaml .Values.onyx.vespa.resources | nindent 12 }}
      {{- if not .Values.onyx.vespa.persistence.enabled }}
      volumes:
        - name: vespa-data
          emptyDir: {}
      {{- end }}
  {{- if .Values.onyx.vespa.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: vespa-data
      spec:
        accessModes:
          {{- toYaml .Values.onyx.vespa.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.onyx.vespa.persistence.size }}
        {{- if .Values.onyx.vespa.persistence.storageClass }}
        storageClassName: {{ .Values.onyx.vespa.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.onyxMinioName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-minio
spec:
  type: ClusterIP
  selector:
    {{- include "clawql-mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-minio
  ports:
    - name: api
      port: {{ .Values.onyx.minio.service.apiPort | int }}
      targetPort: api
    - name: console
      port: {{ .Values.onyx.minio.service.consolePort | int }}
      targetPort: console
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawql-mcp.onyxMinioName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: onyx-minio
  template:
    metadata:
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: onyx-minio
    spec:
      containers:
        - name: minio
          image: "{{ .Values.onyx.minio.image.repository }}:{{ .Values.onyx.minio.image.tag }}"
          imagePullPolicy: {{ .Values.onyx.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :{{ .Values.onyx.minio.service.consolePort | int }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxMinioSecretName" . }}
                  key: {{ .Values.onyx.minio.auth.existingSecretUserKey | quote }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxMinioSecretName" . }}
                  key: {{ .Values.onyx.minio.auth.existingSecretPasswordKey | quote }}
            - name: MINIO_DEFAULT_BUCKETS
              value: {{ .Values.onyx.s3.fileStoreBucketName | quote }}
          ports:
            - name: api
              containerPort: {{ .Values.onyx.minio.service.apiPort | int }}
            - name: console
              containerPort: {{ .Values.onyx.minio.service.consolePort | int }}
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            periodSeconds: 10
          resources:
            {{- toYaml .Values.onyx.minio.resources | nindent 12 }}
          {{- if .Values.onyx.minio.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.onyx.minio.persistence.enabled }}
      volumes:
        - name: data
          {{- if .Values.onyx.minio.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.onyx.minio.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "clawql-mcp.onyxMinioName" . }}-data
          {{- end }}
      {{- end }}
---
