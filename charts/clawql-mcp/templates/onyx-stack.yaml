      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawql-mcp.onyxName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: onyx
  template:
    metadata:
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: onyx
    spec:
      {{- if .Values.onyx.fullVectorStack }}
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "clawql-mcp.onyxPostgresName" . }} {{ .Values.onyx.postgres.service.port }}; do sleep 2; done"]
        - name: wait-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "clawql-mcp.onyxRedisName" . }} {{ .Values.onyx.redis.service.port }}; do sleep 2; done"]
        - name: wait-opensearch
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "clawql-mcp.onyxOpenSearchName" . }} {{ .Values.onyx.opensearch.service.port }}; do sleep 2; done"]
        - name: wait-vespa
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "clawql-mcp.onyxVespaName" . }} 19071; do sleep 2; done"]
        - name: wait-minio
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "clawql-mcp.onyxMinioName" . }} {{ .Values.onyx.minio.service.apiPort }}; do sleep 2; done"]
        - name: wait-inference
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "clawql-mcp.onyxInferenceModelName" . }} {{ .Values.onyx.modelServer.service.port }}; do sleep 2; done"]
        - name: wait-indexing
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z {{ include "clawql-mcp.onyxIndexingModelName" . }} {{ .Values.onyx.modelServer.service.port }}; do sleep 2; done"]
      {{- end }}
      containers:
        - name: onyx-api
          image: "{{ .Values.onyx.api.image.repository }}:{{ .Values.onyx.api.image.tag }}"
          imagePullPolicy: {{ .Values.onyx.api.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - >
              alembic upgrade head &&
              echo "Starting Onyx Api Server" &&
              uvicorn onyx.main:app --host 0.0.0.0 --port {{ .Values.onyx.service.port }}
          env:
            - name: AUTH_TYPE
              value: {{ .Values.onyx.authType | quote }}
            - name: USER_AUTH_SECRET
              value: {{ .Values.onyx.userAuthSecret | quote }}
            - name: POSTGRES_HOST
              value: {{ include "clawql-mcp.onyxPostgresName" . | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.onyx.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxPostgresSecretName" . }}
                  key: password
            - name: POSTGRES_DB
              value: {{ .Values.onyx.postgres.auth.database | quote }}
            {{- if .Values.onyx.fullVectorStack }}
            - name: FILE_STORE_BACKEND
              value: "s3"
            - name: CACHE_BACKEND
              value: "redis"
            - name: AUTH_BACKEND
              value: "redis"
            - name: VESPA_HOST
              value: {{ printf "%s-0.%s" (include "clawql-mcp.onyxVespaName" .) (include "clawql-mcp.onyxVespaName" .) | quote }}
            - name: OPENSEARCH_HOST
              value: {{ include "clawql-mcp.onyxOpenSearchName" . | quote }}
            - name: OPENSEARCH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxOpenSearchSecretName" . }}
                  key: {{ .Values.onyx.opensearch.auth.existingSecretPasswordKey | quote }}
            - name: ENABLE_OPENSEARCH_INDEXING_FOR_ONYX
              value: "true"
            - name: REDIS_HOST
              value: {{ include "clawql-mcp.onyxRedisName" . | quote }}
            - name: MODEL_SERVER_HOST
              value: {{ include "clawql-mcp.onyxInferenceModelName" . | quote }}
            - name: INDEXING_MODEL_SERVER_HOST
              value: {{ include "clawql-mcp.onyxIndexingModelName" . | quote }}
            - name: S3_ENDPOINT_URL
              value: {{ printf "http://%s:%d" (include "clawql-mcp.onyxMinioName" .) (.Values.onyx.minio.service.apiPort | int) | quote }}
            - name: S3_AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxMinioSecretName" . }}
                  key: {{ .Values.onyx.minio.auth.existingSecretUserKey | quote }}
            - name: S3_AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.onyxMinioSecretName" . }}
                  key: {{ .Values.onyx.minio.auth.existingSecretPasswordKey | quote }}
            - name: S3_FILE_STORE_BUCKET_NAME
              value: {{ .Values.onyx.s3.fileStoreBucketName | quote }}
            - name: ENABLE_CRAFT
              value: "false"
            {{- else }}
            - name: DISABLE_VECTOR_DB
              value: "true"
            - name: FILE_STORE_BACKEND
              value: "postgres"
            - name: CACHE_BACKEND
              value: "postgres"
            - name: AUTH_BACKEND
              value: "postgres"
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.onyx.service.port | int }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.onyx.resources | nindent 12 }}
---
{{- if and .Values.onyx.fullVectorStack .Values.onyx.background.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
