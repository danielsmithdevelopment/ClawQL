{{- if .Values.providerIngress.enabled }}
{{- $className := .Values.providerIngress.className }}
{{- $annotations := .Values.providerIngress.annotations }}
{{- $tls := .Values.providerIngress.tls }}
{{- if and .Values.documentPipeline.enabled .Values.documentPipeline.paperless.enabled .Values.providerIngress.paperless.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clawql-mcp.paperlessName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: paperless
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if $tls }}
  tls:
    {{- range $tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.providerIngress.paperless.host | quote }}
      http:
        paths:
          - path: {{ .Values.providerIngress.paperless.path }}
            pathType: {{ .Values.providerIngress.paperless.pathType }}
            backend:
              service:
                name: {{ include "clawql-mcp.paperlessName" . }}
                port:
                  number: {{ .Values.documentPipeline.paperless.service.port }}
---
{{- end }}
