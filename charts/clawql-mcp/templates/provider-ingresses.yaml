{{- if and .Values.onyx.enabled .Values.providerIngress.onyx.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clawql-mcp.onyxName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx-web
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if $tls }}
  tls:
    {{- range $tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.providerIngress.onyx.host | quote }}
      http:
        paths:
          - path: {{ .Values.providerIngress.onyx.path }}
            pathType: {{ .Values.providerIngress.onyx.pathType }}
            backend:
              service:
                name: {{ include "clawql-mcp.onyxName" . }}-web
                port:
                  number: {{ .Values.onyx.web.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "clawql-mcp.onyxName" . }}-api
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: onyx
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  {{- with $className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.providerIngress.onyx.host | quote }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "clawql-mcp.onyxName" . }}
                port:
                  number: {{ .Values.onyx.service.port }}
{{- end }}
{{- end }}
