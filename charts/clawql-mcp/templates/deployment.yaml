apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawql-mcp.fullname" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app: {{ include "clawql-mcp.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "clawql-mcp.selectorLabels" . | nindent 6 }}
      app: {{ include "clawql-mcp.fullname" . }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "clawql-mcp.selectorLabels" . | nindent 8 }}
        app: {{ include "clawql-mcp.fullname" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clawql-mcp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "clawql-mcp.fullname" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.http.targetPort | int }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpc.targetPort | int }}
              protocol: TCP
          env:
            - name: CLAWQL_PROVIDER
              value: {{ .Values.provider | quote }}
            - name: CLAWQL_OBSIDIAN_VAULT_PATH
              value: {{ .Values.obsidianVaultPath | quote }}
            - name: PORT
              value: {{ .Values.port | quote }}
            - name: MCP_PATH
              value: {{ .Values.mcpPath | quote }}
            - name: CLAWQL_BUNDLED_OFFLINE
              value: {{ .Values.bundledOffline | quote }}
            - name: NODE_OPTIONS
              value: {{ .Values.nodeOptions | quote }}
            {{- if .Values.enableGrpc }}
            - name: ENABLE_GRPC
              value: "1"
            {{- end }}
            {{- if .Values.enableGrpcReflection }}
            - name: ENABLE_GRPC_REFLECTION
              value: "1"
            {{- end }}
            {{- if not .Values.enableMemory }}
            - name: CLAWQL_ENABLE_MEMORY
              value: "0"
            {{- end }}
            {{- if not .Values.enableDocuments }}
            - name: CLAWQL_ENABLE_DOCUMENTS
              value: "0"
            {{- end }}
            {{- if .Values.enableSandbox }}
            - name: CLAWQL_ENABLE_SANDBOX
              value: "1"
            {{- end }}
            {{- if .Values.enableNotify }}
            - name: CLAWQL_ENABLE_NOTIFY
              value: "1"
            {{- end }}
            {{- if .Values.enableHitlLabelStudio }}
            - name: CLAWQL_ENABLE_HITL_LABEL_STUDIO
              value: "1"
            {{- end }}
            {{- if .Values.enableOnyx }}
            - name: CLAWQL_ENABLE_ONYX
              value: "1"
            {{- end }}
            {{- if .Values.onyxBaseUrl }}
            - name: ONYX_BASE_URL
              value: {{ .Values.onyxBaseUrl | quote }}
            {{- else if .Values.onyx.enabled }}
            - name: ONYX_BASE_URL
              value: "http://{{ include "clawql-mcp.onyxName" . }}:{{ .Values.onyx.service.port }}"
            {{- end }}
            {{- if .Values.enableOuroboros }}
            - name: CLAWQL_ENABLE_OUROBOROS
              value: "1"
            {{- end }}
            {{- if .Values.ouroborosDatabaseUrl }}
            - name: CLAWQL_OUROBOROS_DATABASE_URL
              value: {{ .Values.ouroborosDatabaseUrl | quote }}
            {{- end }}
            {{- if and .Values.ouroborosPostgres.enabled (not .Values.ouroborosDatabaseUrl) }}
            - name: CLAWQL_OUROBOROS_DB_HOST
              value: {{ include "clawql-mcp.ouroborosPostgresName" . | quote }}
            - name: CLAWQL_OUROBOROS_DB_PORT
              value: {{ .Values.ouroborosPostgres.service.port | quote }}
            - name: CLAWQL_OUROBOROS_DB_USER
              value: {{ .Values.ouroborosPostgres.auth.username | quote }}
            - name: CLAWQL_OUROBOROS_DB_NAME
              value: {{ .Values.ouroborosPostgres.auth.database | quote }}
            - name: CLAWQL_OUROBOROS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawql-mcp.ouroborosPostgresSecretName" . }}
                  key: password
            {{- end }}
            {{- if .Values.nats.url }}
            - name: CLAWQL_NATS_URL
              value: {{ .Values.nats.url | quote }}
            {{- else if .Values.nats.enabled }}
            - name: CLAWQL_NATS_URL
              value: "nats://{{ include "clawql-mcp.natsName" . }}:{{ .Values.nats.service.clientPort }}"
            {{- end }}
            {{- if and .Values.nats.enabled .Values.nats.jetStream.enabled }}
            - name: CLAWQL_NATS_JETSTREAM
              value: "1"
            {{- end }}
            {{- if .Values.documentPipeline.enabled }}
            - name: TIKA_BASE_URL
              value: "http://{{ include "clawql-mcp.tikaName" . }}:{{ .Values.documentPipeline.tika.service.port }}"
            - name: GOTENBERG_BASE_URL
              value: "http://{{ include "clawql-mcp.gotenbergName" . }}:{{ .Values.documentPipeline.gotenberg.service.port }}"
            - name: STIRLING_BASE_URL
              value: "http://{{ include "clawql-mcp.stirlingName" . }}:{{ .Values.documentPipeline.stirling.service.port }}"
            {{- if .Values.documentPipeline.paperless.enabled }}
            - name: PAPERLESS_BASE_URL
              value: "http://{{ include "clawql-mcp.paperlessName" . }}:{{ .Values.documentPipeline.paperless.service.port }}"
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envFromSecret }}
          {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: obsidian-vault
              mountPath: {{ .Values.obsidianVaultPath }}
      volumes:
        - name: obsidian-vault
          {{- if .Values.persistence.enabled }}
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "clawql-mcp.fullname" . }}-vault
          {{- end }}
          {{- else if .Values.vault.hostPath.enabled }}
          hostPath:
            path: {{ quote (required "vault.hostPath.path is required when vault.hostPath.enabled" .Values.vault.hostPath.path) }}
            type: {{ .Values.vault.hostPath.type | default "DirectoryOrCreate" }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
