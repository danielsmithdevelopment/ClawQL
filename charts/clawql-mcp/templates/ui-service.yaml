{{- if .Values.ui.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawql-mcp.uiName" . }}
  labels:
    {{- include "clawql-mcp.labels" . | nindent 4 }}
    app: {{ include "clawql-mcp.uiName" . }}
    app.kubernetes.io/component: ui
spec:
  type: ClusterIP
  selector:
    {{- include "clawql-mcp.selectorLabels" . | nindent 4 }}
    app: {{ include "clawql-mcp.uiName" . }}
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
