# Default resource names match Kustomize (`clawql-mcp-http`) so kubectl snippets in docs stay familiar.
fullnameOverride: clawql-mcp-http
nameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/danielsmithdevelopment/clawql-mcp
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  # Service port for HTTP (MCP + health + GraphQL). Base Kustomize uses 80 → container 8080.
  http:
    port: 80
    targetPort: 8080
  grpc:
    port: 50051
    targetPort: 50051

# Mirrors docker/kustomize/base/deployment-mcp-http.yaml
# Merged `CLAWQL_PROVIDER`: `all-providers` (default) or e.g. `google`. For a custom id list, set extraEnv / patchDeployment with
# `CLAWQL_BUNDLED_PROVIDERS=…` and omit `CLAWQL_PROVIDER` if needed (see README "Configure the API spec").
provider: all-providers
bundledOffline: "1"
obsidianVaultPath: /vault
port: "8080"
mcpPath: /mcp
nodeOptions: "--max-old-space-size=1536"

enableGrpc: false
enableGrpcReflection: false

# In-process MCP cache tool (#75). Ephemeral per pod — not persisted; use memory_* for vault.
enableCache: true

# In-process MCP audit ring buffer (#89). Ephemeral per pod — not on disk; use memory_ingest for durable trails.
enableAudit: false

# MCP notify tool — Slack chat.postMessage (#77). Requires Slack in provider merge + CLAWQL_SLACK_TOKEN (via extraEnv / secret).
enableNotify: false

# MCP knowledge_search_onyx — Onyx POST /search/send-search-message (#118). Requires onyx in provider merge + ONYX_BASE_URL + Bearer token (extraEnv / secret).
enableOnyx: false
# When set, injects ONYX_BASE_URL (non-secret). Prefer extraEnv / envFromSecret for ONYX_API_TOKEN.
onyxBaseUrl: ""

# MCP ouroboros_* tools — clawql-ouroboros evolutionary loop (#141). Optional Postgres for durable events (#142).
enableOuroboros: false
# When set, injects CLAWQL_OUROBOROS_DATABASE_URL. Prefer envFromSecret / extraEnv if the URL contains credentials.
ouroborosDatabaseUrl: ""
# Optional in-cluster Postgres for Ouroboros event lineage (#142), deployed alongside clawql-mcp.
# When enabled, the chart injects CLAWQL_OUROBOROS_DB_* env vars into clawql-mcp.
ouroborosPostgres:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    database: clawql_ouroboros
    username: clawql
    # Used only when existingSecret is empty. Set via values file / --set-file / secret management, not plaintext in git.
    password: ""
    # Existing secret with key `password`.
    existingSecret: ""
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    existingClaim: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Optional full-stack document pipeline topology (#113).
# When enabled, this chart can co-deploy intake/conversion/archive services
# plus their minimal backing stores for integrated local/self-hosted workflows.
documentPipeline:
  enabled: true
  tika:
    image:
      repository: apache/tika
      tag: "2.9.2.1"
      pullPolicy: IfNotPresent
    service:
      port: 9998
  gotenberg:
    image:
      repository: gotenberg/gotenberg
      tag: "8.8"
      pullPolicy: IfNotPresent
    service:
      port: 3000
  stirling:
    image:
      repository: frooodle/s-pdf
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      port: 8080
    auth:
      apiKey: ""
      existingSecret: ""
  paperless:
    enabled: true
    image:
      repository: ghcr.io/paperless-ngx/paperless-ngx
      tag: "2.8.1"
      pullPolicy: IfNotPresent
    service:
      port: 8000
    auth:
      apiToken: ""
      secretKey: ""
      existingSecret: ""
    persistence:
      mediaSize: 20Gi
      dataSize: 10Gi
      consumeSize: 10Gi
      storageClass: ""
      existingMediaClaim: ""
      existingDataClaim: ""
      existingConsumeClaim: ""

stores:
  postgres:
    enabled: true
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    service:
      port: 5432
    auth:
      database: paperless
      username: paperless
      password: "change-me"
      existingSecret: ""
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      existingClaim: ""
  redis:
    enabled: true
    image:
      repository: redis
      tag: "7-alpine"
      pullPolicy: IfNotPresent
    service:
      port: 6379

# Optional Apache Flink cluster for in-cluster Onyx connector jobs (#119).
# Default is internal-only networking (ClusterIP), no ingress.
flink:
  enabled: false
  image:
    repository: flink
    tag: "1.19.1-scala_2.12-java17"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    restPort: 8081
    rpcPort: 6123
    blobPort: 6124
    queryPort: 6125
  jobManager:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  taskManager:
    replicas: 2
    taskSlots: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
  # Secret with connector credentials (e.g. Slack/Confluence/Jira/Drive tokens).
  # Keys in this secret are injected only into Flink pods, not clawql-mcp.
  connectorSecret: ""
  # Additional env entries for both JobManager and TaskManager containers.
  extraEnv: []

# Optional NATS JetStream event backbone for Ouroboros/agents/edge sync (#127).
# Deploys a lightweight single-node NATS with JetStream enabled in-cluster.
nats:
  enabled: false
  # Optional external NATS URL override (for managed/shared clusters).
  # When set, this URL is injected into clawql-mcp as CLAWQL_NATS_URL.
  url: ""
  image:
    repository: nats
    tag: "2.10.17-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    clientPort: 4222
    clusterPort: 6222
    monitorPort: 8222
  jetStream:
    enabled: true
    # NATS size format, examples: 512Mi, 2Gi.
    maxMemoryStore: 256Mi
    maxFileStore: 10Gi
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    existingClaim: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Extra env (e.g. tokens from literal — prefer existing secrets for production).
extraEnv: []

# Optional: load env vars from an existing Secret (keys become env var names).
envFromSecret: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  failureThreshold: 36
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

persistence:
  enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  existingClaim: ""

# Docker Desktop / single-node: bind a host directory into the pod for Obsidian vault persistence.
# Mutually exclusive with persistence.enabled (PVC wins if both are set).
vault:
  hostPath:
    enabled: false
    path: ""
    type: DirectoryOrCreate

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: clawql.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

ui:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/danielsmithdevelopment/clawql-website
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
    targetPort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: clawql.localhost
        paths:
          - path: /
            pathType: Prefix
    tls: []

nodeSelector: {}
tolerations: []
affinity: {}
