# Default resource names match Kustomize (`clawql-mcp-http`) so kubectl snippets in docs stay familiar.
fullnameOverride: clawql-mcp-http
nameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/danielsmithdevelopment/clawql-mcp
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  # Service port for HTTP (MCP + health + GraphQL). Base Kustomize uses 80 → container 8080.
  http:
    port: 80
    targetPort: 8080
  grpc:
    port: 50051
    targetPort: 50051

# Mirrors docker/kustomize/base/deployment-mcp-http.yaml
# Merged `CLAWQL_PROVIDER`: `all-providers` (default) or e.g. `google`. For a custom id list, set extraEnv / patchDeployment with
# `CLAWQL_BUNDLED_PROVIDERS=…` and omit `CLAWQL_PROVIDER` if needed (see README "Configure the API spec").
provider: all-providers
bundledOffline: "1"
obsidianVaultPath: /vault
port: "8080"
mcpPath: /mcp
nodeOptions: "--max-old-space-size=1536"

enableGrpc: false
enableGrpcReflection: false

# memory_ingest / memory_recall (default on). Set false to inject CLAWQL_ENABLE_MEMORY=0.
enableMemory: true
# Document stack: tika, gotenberg, paperless, stirling, onyx in all-providers merge + ingest_external_knowledge + (with enableOnyx) knowledge_search_onyx. Set false to inject CLAWQL_ENABLE_DOCUMENTS=0.
enableDocuments: true

# MCP sandbox_exec — isolated snippets (bridge / Seatbelt / Docker; #207). Default off; set true + bridge URL/token (or CLAWQL_SANDBOX_BACKEND) via extraEnv.
enableSandbox: false

# MCP notify tool — Slack chat.postMessage (#77). Requires Slack in provider merge + CLAWQL_SLACK_TOKEN (via extraEnv / secret).
enableNotify: false

# MCP knowledge_search_onyx — Onyx POST /search/send-search-message (#118). Requires onyx in provider merge + ONYX_BASE_URL + Bearer token (extraEnv / secret).
enableOnyx: false
# When set, injects ONYX_BASE_URL (non-secret). Prefer extraEnv / envFromSecret for ONYX_API_TOKEN.
onyxBaseUrl: ""
onyx:
  enabled: false
  # When true (default), deploy Vespa + OpenSearch + Redis + MinIO + model servers + background worker
  # (matches upstream docker-compose). When false, deploy a minimal postgres-backed API (vector search disabled).
  fullVectorStack: true
  api:
    image:
      repository: onyxdotapp/onyx-backend
      tag: latest
      pullPolicy: IfNotPresent
  web:
    image:
      repository: onyxdotapp/onyx-web-server
      tag: latest
      pullPolicy: IfNotPresent
    service:
      port: 3000
  service:
    port: 8080
  authType: basic
  userAuthSecret: "change-me-onyx-user-auth-secret"
  # S3 / MinIO object store (full stack).
  s3:
    fileStoreBucketName: onyx-file-store-bucket
  redis:
    image:
      repository: redis
      tag: 7.4-alpine
      pullPolicy: IfNotPresent
    service:
      port: 6379
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
  opensearch:
    image:
      repository: opensearchproject/opensearch
      tag: "3.4.0"
      pullPolicy: IfNotPresent
    service:
      port: 9200
    # JVM heap for OpenSearch (raise for production).
    javaOpts: "-Xms512m -Xmx512m"
    # Do not set DISABLE_INSTALL_DEMO_CONFIG=true with OPENSEARCH_INITIAL_ADMIN_PASSWORD:
    # the security plugin then loads without demo TLS and fails ("No SSL configuration found").
    auth:
      adminPassword: "StrongPassword123!"
      existingSecret: ""
      existingSecretPasswordKey: password
    persistence:
      enabled: false
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      existingClaim: ""
    resources:
      requests:
        cpu: 250m
        memory: 1536Mi
      limits:
        cpu: "2"
        memory: 3Gi
  vespa:
    image:
      repository: vespaengine/vespa
      tag: "8.609.39"
      pullPolicy: IfNotPresent
    skipUpgradeCheck: "true"
    # Vespa container startup guard; keep false by default for safety.
    ignoreNotEnoughMemory: false
    persistence:
      enabled: false
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      existingClaim: ""
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 6Gi
  minio:
    image:
      repository: minio/minio
      tag: RELEASE.2025-07-23T15-54-02Z-cpuv1
      pullPolicy: IfNotPresent
    service:
      apiPort: 9000
      consolePort: 9001
    auth:
      rootUser: minioadmin
      rootPassword: minioadmin
      existingSecret: ""
      existingSecretUserKey: root-user
      existingSecretPasswordKey: root-password
    persistence:
      enabled: false
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 20Gi
      existingClaim: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  modelServer:
    image:
      repository: onyxdotapp/onyx-model-server
      tag: latest
      pullPolicy: IfNotPresent
    service:
      port: 9000
    resources:
      requests:
        cpu: 250m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 8Gi
  background:
    enabled: true
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 3Gi
  postgres:
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    service:
      port: 5432
    auth:
      database: onyx
      username: onyx
      password: "change-me"
      existingSecret: ""
    persistence:
      enabled: false
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 10Gi
      existingClaim: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi

# MCP ouroboros_* tools — clawql-ouroboros evolutionary loop (#141). Optional Postgres for durable events (#142).
enableOuroboros: false
# When set, injects CLAWQL_OUROBOROS_DATABASE_URL. Prefer envFromSecret / extraEnv if the URL contains credentials.
ouroborosDatabaseUrl: ""
# Optional in-cluster Postgres for Ouroboros event lineage (#142), deployed alongside clawql-mcp.
# When enabled, the chart injects CLAWQL_OUROBOROS_DB_* env vars into clawql-mcp.
ouroborosPostgres:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    database: clawql_ouroboros
    username: clawql
    # Used only when existingSecret is empty. Set via values file / --set-file / secret management, not plaintext in git.
    password: ""
    # Existing secret with key `password`.
    existingSecret: ""
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    existingClaim: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Optional full-stack document pipeline topology (#113).
# When enabled, this chart can co-deploy intake/conversion/archive services
# plus their minimal backing stores for integrated local/self-hosted workflows.
documentPipeline:
  enabled: true
  tika:
    image:
      repository: apache/tika
      tag: "2.9.2.1"
      pullPolicy: IfNotPresent
    service:
      port: 9998
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
  gotenberg:
    image:
      repository: gotenberg/gotenberg
      tag: "8.8"
      pullPolicy: IfNotPresent
    service:
      port: 3000
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
  stirling:
    image:
      repository: frooodle/s-pdf
      tag: "latest"
      pullPolicy: IfNotPresent
    service:
      port: 8080
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    auth:
      apiKey: ""
      existingSecret: ""
    security:
      # Enables Stirling user auth/admin features.
      enableLogin: false
      # Keep extra enterprise/admin features available when login is enabled.
      disableAdditionalFeatures: false
  paperless:
    enabled: true
    image:
      repository: ghcr.io/paperless-ngx/paperless-ngx
      tag: "2.8.1"
      pullPolicy: IfNotPresent
    service:
      port: 8000
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
    auth:
      apiToken: ""
      secretKey: ""
      # Optional admin bootstrap for paperless-ngx. On startup, the container creates
      # the admin user when it does not already exist.
      adminUser: ""
      adminPassword: ""
      adminMail: ""
      existingSecret: ""
    persistence:
      mediaSize: 20Gi
      dataSize: 10Gi
      consumeSize: 10Gi
      storageClass: ""
      existingMediaClaim: ""
      existingDataClaim: ""
      existingConsumeClaim: ""

stores:
  postgres:
    enabled: true
    image:
      repository: postgres
      tag: "16-alpine"
      pullPolicy: IfNotPresent
    service:
      port: 5432
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    auth:
      database: paperless
      username: paperless
      password: "change-me"
      existingSecret: ""
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      existingClaim: ""
  redis:
    enabled: true
    image:
      repository: redis
      tag: "7-alpine"
      pullPolicy: IfNotPresent
    service:
      port: 6379
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Optional Apache Flink cluster for in-cluster Onyx connector jobs (#119).
# Default is internal-only networking (ClusterIP), no ingress.
flink:
  enabled: false
  image:
    repository: flink
    tag: "1.19.1-scala_2.12-java17"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    restPort: 8081
    rpcPort: 6123
    blobPort: 6124
    queryPort: 6125
  jobManager:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  taskManager:
    replicas: 2
    taskSlots: 2
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 2Gi
  # Secret with connector credentials (e.g. Slack/Confluence/Jira/Drive tokens).
  # Keys in this secret are injected only into Flink pods, not clawql-mcp.
  connectorSecret: ""
  # Optional explicit Flink process memory sizing (required by some Flink images).
  jobManagerMemoryProcessSize: ""
  taskManagerMemoryProcessSize: ""
  # Additional env entries for both JobManager and TaskManager containers.
  extraEnv: []

# Optional NATS JetStream event backbone for Ouroboros/agents/edge sync (#127).
# Deploys a lightweight single-node NATS with JetStream enabled in-cluster.
nats:
  enabled: false
  # Optional external NATS URL override (for managed/shared clusters).
  # When set, this URL is injected into clawql-mcp as CLAWQL_NATS_URL.
  url: ""
  image:
    repository: nats
    tag: "2.10.17-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    clientPort: 4222
    clusterPort: 6222
    monitorPort: 8222
  jetStream:
    enabled: true
    # NATS size format, examples: 512Mi, 2Gi.
    maxMemoryStore: 256Mi
    maxFileStore: 10Gi
  persistence:
    enabled: false
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    existingClaim: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# Extra env (e.g. tokens from literal — prefer existing secrets for production).
extraEnv: []

# Optional: load env vars from an existing Secret (keys become env var names).
envFromSecret: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  failureThreshold: 36
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

persistence:
  enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  existingClaim: ""

# Docker Desktop / single-node: bind a host directory into the pod for Obsidian vault persistence.
# Mutually exclusive with persistence.enabled (PVC wins if both are set).
vault:
  hostPath:
    enabled: false
    path: ""
    type: DirectoryOrCreate

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: clawql.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

ui:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/danielsmithdevelopment/clawql-website
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
    targetPort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: clawql.localhost
        paths:
          - path: /
            pathType: Prefix
    tls: []

# Optional per-service ingresses for HTTP-capable provider stacks.
# Useful for local Docker Desktop hostnames like *.localhost.
providerIngress:
  enabled: false
  className: nginx
  annotations: {}
  tls: []
  paperless:
    enabled: true
    host: paperless.localhost
    path: /
    pathType: Prefix
  stirling:
    enabled: true
    host: stirling.localhost
    path: /
    pathType: Prefix
  tika:
    enabled: true
    host: tika.localhost
    path: /
    pathType: Prefix
  gotenberg:
    enabled: true
    host: gotenberg.localhost
    path: /
    pathType: Prefix
  flink:
    enabled: true
    host: flink.localhost
    path: /
    pathType: Prefix
  natsMonitor:
    enabled: true
    host: nats.localhost
    path: /
    pathType: Prefix
  onyx:
    enabled: true
    host: onyx.localhost
    path: /
    pathType: Prefix

# Kyverno ClusterPolicy: require Cosign (keyless / GitHub Actions) for ClawQL GHCR images (default on).
# Prerequisite: Kyverno installed in the cluster (CRD kyverno.io/v1 ClusterPolicy). For clusters without
# Kyverno, set kyverno.imageSignaturePolicy.enabled=false before install, or install Kyverno first.
kyverno:
  imageSignaturePolicy:
    enabled: true
    # When true, only Pods in the Helm release namespace are matched (useful on shared dev clusters).
    matchReleaseNamespaceOnly: false
    policyName: ""
    policyTitle: "ClawQL GHCR — require Cosign (keyless / GitHub Actions)"
    validationFailureAction: Enforce
    background: false
    failurePolicy: Fail
    webhookTimeoutSeconds: 30
    verifyDigest: false
    mutateDigest: false
    excludeNamespaces:
      - kube-system
      - kyverno
      - kube-public
    imageReferences:
      - "ghcr.io/danielsmithdevelopment/clawql-mcp*"
      - "ghcr.io/danielsmithdevelopment/clawql-website*"
    cosign:
      subjectRegExp: "^https://github\\.com/danielsmithdevelopment/ClawQL/.*"
      issuerRegExp: "^https://token\\.actions\\.githubusercontent\\.com.*"
      rekorUrl: "https://rekor.sigstore.dev"

nodeSelector: {}
tolerations: []
affinity: {}
