# Default resource names match Kustomize (`clawql-mcp-http`) so kubectl snippets in docs stay familiar.
fullnameOverride: clawql-mcp-http
nameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/danielsmithdevelopment/clawql-mcp
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  # Service port for HTTP (MCP + health + GraphQL). Base Kustomize uses 80 → container 8080.
  http:
    port: 80
    targetPort: 8080
  grpc:
    port: 50051
    targetPort: 50051

# Mirrors docker/kustomize/base/deployment-mcp-http.yaml
# Merged `CLAWQL_PROVIDER`: `all-providers` (default) or e.g. `google`. For a custom id list, set extraEnv / patchDeployment with
# `CLAWQL_BUNDLED_PROVIDERS=…` and omit `CLAWQL_PROVIDER` if needed (see README "Configure the API spec").
provider: all-providers
bundledOffline: "1"
obsidianVaultPath: /vault
port: "8080"
mcpPath: /mcp
nodeOptions: "--max-old-space-size=1536"

enableGrpc: false
enableGrpcReflection: false

# In-process MCP cache tool (#75). Ephemeral per pod — not persisted; use memory_* for vault.
enableCache: true

# In-process MCP audit ring buffer (#89). Ephemeral per pod — not on disk; use memory_ingest for durable trails.
enableAudit: false

# Extra env (e.g. tokens from literal — prefer existing secrets for production).
extraEnv: []

# Optional: load env vars from an existing Secret (keys become env var names).
envFromSecret: ""

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  failureThreshold: 36
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

persistence:
  enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  existingClaim: ""

# Docker Desktop / single-node: bind a host directory into the pod for Obsidian vault persistence.
# Mutually exclusive with persistence.enabled (PVC wins if both are set).
vault:
  hostPath:
    enabled: false
    path: ""
    type: DirectoryOrCreate

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: clawql.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

ui:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/danielsmithdevelopment/clawql-website
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 3000
    targetPort: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: clawql.localhost
        paths:
          - path: /
            pathType: Prefix
    tls: []

nodeSelector: {}
tolerations: []
affinity: {}
